server {
    listen 80;
    server_name gitflow.online www.gitflow.online;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name gitflow.online www.gitflow.online;

    # SSL Certificate paths (mounted via Docker volumes)
    ssl_certificate     /etc/letsencrypt/live/gitflow.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gitflow.online/privkey.pem;

    # Recommended SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # API Proxy
    location /api/ {
        set $backend_host backend;
        proxy_pass http://$backend_host:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
