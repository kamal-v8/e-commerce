<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Register | Brew & Bloom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="container">
      <nav>
        <a href="/" class="logo">Brew & Bloom</a>
        <ul class="nav-links">
          <li><a href="/">Home</a></li>
          <li><a href="/shop">Shop</a></li>
          <li><a href="/about">About</a></li>
          <li><a href="/auth" class="active">Login</a></li>
        </ul>
        <div class="nav-icons">
          <a href="/cart" class="cart-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <span class="cart-count">0</span>
          </a>
        </div>
      </nav>
    </div>
  </header>

  <section>
    <div class="auth-container">
      <!-- Login Section -->
      <div id="login-section">
        <h2 style="margin-bottom: 2rem;">Welcome Back</h2>
        <form id="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn" style="width: 100%;">Sign In</button>
        </form>
        <div class="form-footer">
          <p>Don't have an account? <a href="#" id="show-register">Create one</a></p>
        </div>
      </div>

      <!-- Register Section (Hidden by default) -->
      <div id="register-section" style="display: none;">
        <h2 style="margin-bottom: 2rem;">Create Account</h2>
        <form id="register-form">
          <div class="form-group">
            <label for="reg-name">Full Name</label>
            <input type="text" id="reg-name" class="form-control" placeholder="Your Name" required>
          </div>
          <div class="form-group">
            <label for="reg-email">Email Address</label>
            <input type="email" id="reg-email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn" style="width: 100%;">Register</button>
        </form>
        <div class="form-footer">
          <p>Already have an account? <a href="#" id="show-login">Login here</a></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Script to toggle forms -->
  <script>
    const loginSec = document.getElementById('login-section');
    const registerSec = document.getElementById('register-section');
    
    document.getElementById('show-register').onclick = (e) => {
      e.preventDefault();
      loginSec.style.display = 'none';
      registerSec.style.display = 'block';
    };
    
    document.getElementById('show-login').onclick = (e) => {
      e.preventDefault();
      registerSec.style.display = 'none';
      loginSec.style.display = 'block';
    };
  </script>
  
  <script type="module" src="app.js"></script>
</body>
</html>
