name: bloom-brew-ci
on:
  push:
    branches:
      - main
      - dev
      - gh
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  Code-Quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test || echo "No tests found, but moving forward!"

      - name: Security Audit
        run: npm audit --audit-level=high
